<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ambulance Navigation Demo</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <div id="map"></div>

      <aside class="nav-panel">
        <div class="nav-panel__header">
          <div>
            <p class="eyebrow">Live Navigation</p>
            <h1>Ambulance Route</h1>
          </div>
          <span class="status-pill">En route</span>
        </div>

        <div class="summary-grid">
          <div class="summary-card">
            <span class="summary-label">Distance hnjh</span>
            <strong id="distance">Calculating...</strong>
          </div>
          <div class="summary-card">
            <span class="summary-label">ETA</span>
            <strong id="eta">Calculating...</strong>
          </div>
        </div>

        <div class="instruction-block">
          <div class="instruction-title-row">
            <h2>Turn-by-turn</h2>
            <span class="dot"></span>
          </div>
          <ol id="instructions" class="instructions-list">
            <li>Fetching the best route...</li>
          </ol>
        </div>
      </aside>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
